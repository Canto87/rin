services:
  postgres:
    build:
      context: .
      dockerfile: docker/Dockerfile.postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres  # Change for non-local deployments
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres && psql -U postgres -d rin_memory -c 'SELECT 1' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    ports:
      - "${RIN_PG_PORT:-5434}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - ollama_data:/root/.ollama

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      RIN_MEMORY_DSN: "postgres://postgres:postgres@postgres:5432/rin_memory"
      OLLAMA_HOST: "http://ollama:11434"
      RIN_PROJECT: "test-pipeline"
      RIN_HOME: "/app"

  app-install:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RIN_MEMORY_DSN: "postgres://postgres:postgres@postgres:5432/rin_memory"
      RIN_HOME: "/app"
    command: ["/app/test-install.sh"]

volumes:
  pgdata:
  ollama_data:
