# plan-feature skill configuration
# Project-specific settings for project-rin

project:
  name: "project-rin"
  language: go  # go | python | typescript | java | rust | other

paths:
  source: "src"         # Source code path
  plans: "docs/plans"   # Design docs output path

# Integration layers for Q&A integration question
integrations:
  - label: "MCP Server"
    description: "Go MCP server with memory tools (src/rin_memory_go/)"
    path: "src/rin_memory_go"
  - label: "Storage"
    description: "PostgreSQL + pgvector storage (src/rin_memory_go/store.go)"
    path: "src/rin_memory_go/store.go"
  - label: "Proxy"
    description: "Go reverse proxy for API routing (src/rin_proxy/)"
    path: "src/rin_proxy"

# Storage options for Q&A storage question
storage:
  - label: "PostgreSQL + pgvector"
    description: "Primary vector + relational DB"
    recommended: true
  - label: "LanceDB"
    description: "Local vector store (legacy)"
  - label: "File system"
    description: "Plain files in ~/.rin/"
